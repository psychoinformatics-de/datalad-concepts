id: https://concepts.datalad.org/s/types/unreleased
name: types-development-schema
version: UNRELEASED
status: eunal:concept-status/DRAFT
title: Collection of common types and a type-designator
description: |
  This schema extends [types/v1](../../types/v1) with additional reusable
  type definitions. It can be imported by any schema that needs these types,
  regardless of whether it goes through the `things` or `flat` schema chain.

  The schema definition is available as

  - [JSON-LD context](../unreleased.context.jsonld)
  - [LinkML YAML](../unreleased.yaml)
  - [LinkML YAML (static/resolved)](../unreleased.static.yaml)
  - [OWL TTL](../unreleased.owl.ttl)
  - [SHACL TTL](../unreleased.shacl.ttl)

comments:
  - ALL CONTENT HERE IS UNRELEASED AND MAY CHANGE ANY TIME

license: MIT

prefixes:
  dlschemas: https://concepts.datalad.org/s/
  dltypes: https://concepts.datalad.org/s/types/v1/
  eunal: http://publications.europa.eu/resource/authority/
  linkml: https://w3id.org/linkml/
  xsd: http://www.w3.org/2001/XMLSchema#

default_prefix: dltypes

emit_prefixes:
  - dltypes
  - xsd

imports:
  - linkml:types

types:
  OrcidNotation:
    uri: dltypes:OrcidNotation
    base: str
    typeof: string
    description: >-
      ORCID identifier notation (without URL prefix).
      Format: four groups of four digits separated by hyphens,
      with the last character being a digit or X.
    pattern: '^\d{4}-\d{4}-\d{4}-\d{3}[0-9X]{1}$'

  DoiNotation:
    uri: dltypes:DoiNotation
    base: str
    typeof: string
    description: >-
      DOI identifier notation (without URL or doi: prefix).
    pattern: '(?i)^(?!(?:https?://|doi:)).+$'

  IssnNotation:
    uri: dltypes:IssnNotation
    base: str
    typeof: string
    description: >-
      ISSN identifier notation. Format: four digits, hyphen,
      three digits, and a check character (digit or X).
    pattern: '^\d{4}-\d{3}[\dX]$'

  RelativePath:
    uri: dltypes:RelativePath
    base: str
    typeof: string
    description: >-
      A relative file path (no leading slash).
    pattern: '^[^/]+.*$'
